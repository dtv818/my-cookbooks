<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Cookbook Index</title>
    <link rel="apple-touch-icon" href="icon.png"> <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; margin: 0; background: #f4f4f9; }
        header { background: #ff6b6b; color: white; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .nav-bar { display: flex; justify-content: space-around; background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; padding: 10px 0; }
        .tab { font-size: 0.8rem; color: #888; text-decoration: none; text-align: center; flex: 1; }
        .container { padding: 20px; margin-bottom: 70px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header id="view-title">My Cookbooks</header>

<div class="container">
    <div id="library-view">
        <button onclick="showAddBook()">+ Add New Cookbook</button>
        <div id="book-list"></div>
    </div>

    <div id="search-view" class="hidden">
        <input type="text" id="search-bar" placeholder="Search by ingredient (e.g. Garlic)..." onkeyup="searchRecipes()">
        <div id="results-list"></div>
    </div>

    <div id="log-view" class="hidden">
        <h3>Cooking History</h3>
        <div id="history-list"></div>
    </div>
</div>

<nav class="nav-bar">
    <a href="#" class="tab" onclick="switchView('library')">📚 Books</a>
    <a href="#" class="tab" onclick="switchView('search')">🔍 Search</a>
    <a href="#" class="tab" onclick="switchView('log')">📅 History</a>
</nav>

<script>
    // This is where the "logic" lives. 
    // We'll add functions here to save recipes to your phone's memory.
    function switchView(view) {
        document.getElementById('library-view').classList.add('hidden');
        document.getElementById('search-view').classList.add('hidden');
        document.getElementById('log-view').classList.add('hidden');
        document.getElementById(view + '-view').classList.remove('hidden');
        document.getElementById('view-title').innerText = view.charAt(0).toUpperCase() + view.slice(1);
    }
    async function importFromUrl() {
    const url = document.getElementById('import-url').value;
    if (!url) return alert("Please paste a URL first!");

    // We use an open-source tool called 'AllOrigins' to bypass 'CORS' blocks
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    
    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        const html = data.contents;
        
        // Use a temporary element to parse the HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Search for the hidden "JSON-LD" recipe data
        const jsonLd = doc.querySelector('script[type="application/ld+json"]');
        
        if (jsonLd) {
            const recipeData = JSON.parse(jsonLd.innerText);
            // If it's an array, find the 'Recipe' type object
            const recipe = Array.isArray(recipeData) ? recipeData.find(i => i['@type'] === 'Recipe') : recipeData;
            
            saveRecipe({
                title: recipe.name,
                ingredients: recipe.recipeIngredient,
                instructions: recipe.recipeInstructions,
                source: url
            });
            alert("Recipe Imported!");
        } else {
            alert("Couldn't find structured recipe data. You might have to copy/paste manually.");
        }
    } catch (error) {
        console.error(error);
        alert("Import failed. The site might be protected.");
    }// Initialization: Load data from the phone's memory on startup
let myLibrary = JSON.parse(localStorage.getItem('recipeLibrary')) || { books: [], recipes: [], log: [] };

function saveToPhone() {
    localStorage.setItem('recipeLibrary', JSON.stringify(myLibrary));
    renderLibrary();
    renderSearch();
    renderLog();
}

// --- Library Functions ---
function addBook() {
    const title = prompt("Enter Cookbook Title:");
    if (title) {
        myLibrary.books.push({ id: Date.now(), title: title, recipes: [] });
        saveToPhone();
    }
}

function renderLibrary() {
    const list = document.getElementById('book-list');
    list.innerHTML = myLibrary.books.map(book => `
        <div class="card">
            <strong>📖 ${book.title}</strong>
            <p>${myLibrary.recipes.filter(r => r.bookId === book.id).length} Recipes saved</p>
        </div>
    `).join('');
}

// --- Search Functions ---
function renderSearch() {
    const results = document.getElementById('results-list');
    const searchTerm = document.getElementById('search-bar').value.toLowerCase();
    
    const filtered = myLibrary.recipes.filter(r => 
        r.title.toLowerCase().includes(searchTerm) || 
        r.ingredients.some(i => i.toLowerCase().includes(searchTerm))
    );

    results.innerHTML = filtered.map(r => `
        <div class="card">
            <strong>🍴 ${r.title}</strong><br>
            <small>Source: ${r.bookName || 'Web Import'}</small>
            <button onclick="logMeal('${r.title}')">Add to Log</button>
        </div>
    `).join('');
}

// --- History/Log Functions ---
function logMeal(recipeTitle) {
    const note = prompt(`Any notes for ${recipeTitle}?`);
    myLibrary.log.push({
        date: new Date().toLocaleDateString(),
        title: recipeTitle,
        note: note
    });
    saveToPhone();
    alert("Saved to History!");
}

function renderLog() {
    const list = document.getElementById('history-list');
    list.innerHTML = myLibrary.log.map(entry => `
        <div class="card">
            <strong>${entry.date}</strong>: ${entry.title}<br>
            <em>Note: ${entry.note}</em>
        </div>
    `).reverse().join(''); // Show newest first
}

// Run on page load
renderLibrary();
}
</script>

</body>
</html>
